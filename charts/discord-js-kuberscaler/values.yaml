# Default values for discord-js-kuberscaler operator

replicaCount: 1

image:
  repository: ghcr.io/kashalls/discord.js-kuberscaler
  pullPolicy: IfNotPresent
  # Overrides the image tag. Defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Create a ServiceAccount for the operator.
  create: true
  # Annotations to add to the ServiceAccount.
  annotations: {}
  # The name of the ServiceAccount. If not set, a name is generated using the fullname template.
  name: ""

rbac:
  # Create ClusterRole and ClusterRoleBinding for the operator.
  create: true

leaderElection:
  # Enable leader election for HA deployments (recommended for production).
  enabled: true

metrics:
  # Expose a metrics Service on port 8443 (HTTPS).
  enabled: true
  port: 8443
  # Create a Prometheus ServiceMonitor.
  serviceMonitor:
    enabled: false
    # Namespace where the ServiceMonitor should be created. Defaults to release namespace.
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    # Additional labels added to the ServiceMonitor (e.g. to match a Prometheus instance).
    additionalLabels: {}

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
