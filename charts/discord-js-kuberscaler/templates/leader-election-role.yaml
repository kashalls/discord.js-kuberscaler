{{- if and .Values.rbac.create .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "discord-js-kuberscaler.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "discord-js-kuberscaler.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: [configmaps]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "discord-js-kuberscaler.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "discord-js-kuberscaler.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "discord-js-kuberscaler.fullname" . }}-leader-election
subjects:
- kind: ServiceAccount
  name: {{ include "discord-js-kuberscaler.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
