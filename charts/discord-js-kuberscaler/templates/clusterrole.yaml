{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "discord-js-kuberscaler.fullname" . }}-manager
  labels:
    {{- include "discord-js-kuberscaler.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: [secrets]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [services]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [apps]
  resources: [statefulsets]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [discord.ok8.sh]
  resources: [discordsharders]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [discord.ok8.sh]
  resources: [discordsharders/finalizers]
  verbs: [update]
- apiGroups: [discord.ok8.sh]
  resources: [discordsharders/status]
  verbs: [get, patch, update]
{{- end }}
