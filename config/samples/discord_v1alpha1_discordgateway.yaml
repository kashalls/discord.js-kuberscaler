apiVersion: discord.nerdz.io/v1alpha1
kind: DiscordGateway
metadata:
  labels:
    app.kubernetes.io/name: discord-kuberscaler
    app.kubernetes.io/managed-by: kustomize
  name: discordgateway-sample
spec:
  image: ghcr.io/example/discord-bot:latest
  tokenSecretRef:
    name: discord-bot-token
    key: token
  sharding:
    mode: Recommended
    minShards: 1
    maxShards: 10
  intents:
    privileged: false
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
