---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - discord.nerdz.io
  resources:
  - discordgateways
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - discord.nerdz.io
  resources:
  - discordgateways/finalizers
  verbs:
  - update
- apiGroups:
  - discord.nerdz.io
  resources:
  - discordgateways/status
  verbs:
  - get
  - patch
  - update
