# permissions for end users to view discordgateways.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: discord-kuberscaler
    app.kubernetes.io/managed-by: kustomize
  name: discordgateway-viewer-role
rules:
- apiGroups:
  - discord.nerdz.io
  resources:
  - discordgateways
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - discord.nerdz.io
  resources:
  - discordgateways/status
  verbs:
  - get
