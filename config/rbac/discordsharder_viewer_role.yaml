# permissions for end users to view discordsharders.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: discord-kuberscaler
    app.kubernetes.io/managed-by: kustomize
  name: discordsharder-viewer-role
rules:
- apiGroups:
  - discord.ok8.sh
  resources:
  - discordsharders
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - discord.ok8.sh
  resources:
  - discordsharders/status
  verbs:
  - get
